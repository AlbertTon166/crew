version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: crew-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crew}
      POSTGRES_USER: ${POSTGRES_USER:-crew_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crew_user} -d ${POSTGRES_DB:-crew}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crew-network

  # Redis for Job Queue
  redis:
    image: redis:7-alpine
    container_name: crew-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crew-network

  # ChromaDB for RAG Vector Store (optional - needed for Sprint 2)
  chromadb:
    image: chromadb/chroma:latest
    container_name: crew-chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - chromadb_data:/chroma/chroma/.chroma
    networks:
      - crew-network

  # Backend API Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: crew-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-crew_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crew}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-crew-dev-secret-change-in-production}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - crew-network

  # Frontend Service (React SPA with Nginx)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: crew-frontend
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - crew-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: crew-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - crew-network

  # Docker-in-Docker for Sandbox Execution (REMOVED - requires too much memory for 2核4G)
  # To re-enable on larger servers:
  # docker-dind:
  #   image: docker:dind
  #   privileged: true
  #   ...

volumes:
  postgres_data:
  redis_data:
  chromadb_data:

networks:
  crew-network:
    driver: bridge
