#===========================================
# Agent Teams Manager - Docker Compose
# 支持云端/本地两种部署模式
#
# 使用方式:
#   全部服务 (云端模式): docker-compose --profile cloud up -d
#   仅核心服务 (本地模式): docker-compose up -d
#===========================================

services:
  # ========== 核心服务 (始终运行) ==========
  
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-agent-teams}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_teams
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    networks:
      - agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-agent-teams}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: ${PROJECT_NAME:-agent-teams}-chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API Server (Agent Teams Core)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-agent-teams}-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DEPLOY_MODE: ${DEPLOY_MODE:-cloud}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: agent_teams
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${SERVER_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - agent-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ========== 云端模式专属服务 ==========
  
  # Frontend Web UI
  frontend:
    profiles: [cloud]
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-agent-teams}-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:3001}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - agent-network

  # Monitoring Dashboard
  monitoring:
    profiles: [cloud]
    image: prom/prometheus:latest
    container_name: ${PROJECT_NAME:-agent-teams}-monitoring
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${MONITORING_PORT:-9090}:9090"
    networks:
      - agent-network
    depends_on:
      - backend

networks:
  agent-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  prometheus_data:
